<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var currentPath =
          window.location.pathname +
          window.location.search +
          window.location.hash;
        sessionStorage.setItem("gh-pages-redirect", currentPath);
        window.location.replace("/cindertide-studio-site/");
      })();
    </script>
  </head>
  <body></body>
</html>
